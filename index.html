<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Elegibilidade Previdenciária — Protótipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7fb;
    --card: #ffffff;
    --card-2: #f1f0fa;
    --ink: #1c1a2e;
    --muted: #6b6886;
    --primary: #6d4aff;
    --primary-2: #4f6bff;
    --primary-dark: #5636e0;
    --header-bg: #050718;
    --warn: #b5841f;
    --bad: #8b87a8;
    --border: #e2e0f0;
    --border-hover: #6d4aff;
    --font: "Space Grotesk", -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .site-header {
    width: 100%;
    background: var(--header-bg);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .site-header-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .site-header h2 {
    margin: 0;
    font-family: var(--font);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #ffffff;
  }
  .site-header .version {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
  }
  .page-wrap {
    display: flex;
    justify-content: center;
    padding: 32px 24px;
  }
  .app {
    width: 100%;
    max-width: 640px;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .back-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink);
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--primary); }
  .back-btn svg { width: 20px; height: 20px; }
  .back-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-2), var(--primary));
    transition: width .25s ease;
    border-radius: 999px;
  }
  .step-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
  }
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 30px 28px;
    box-shadow: 0 2px 8px rgba(28,26,46,0.04);
  }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    background: linear-gradient(90deg, var(--primary-2), var(--primary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
  }
  h1.question {
    font-size: 27px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  .hint {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.4;
    margin: 0 0 20px;
  }
  .options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .options.options-wide {
    grid-template-columns: 1fr;
  }
  .options.options-triple {
    grid-template-columns: repeat(3, 1fr);
  }
  .opt-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    text-align: left;
    background: var(--card-2);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 22px 20px;
    min-height: 124px;
    min-width: 0;
    width: 100%;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .opt-btn:hover {
    border-color: var(--border-hover);
  }
  .opt-btn:active { transform: scale(0.98); }
  .opt-btn.selected {
    border-color: var(--primary);
    background: linear-gradient(135deg, rgba(109,74,255,0.10), rgba(79,107,255,0.06));
    font-weight: 600;
  }
  .options-wide .opt-btn {
    flex-direction: row;
    align-items: center;
    min-height: unset;
    padding: 18px 20px;
  }
  .opt-icon {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
  }
  .opt-icon svg { width: 28px; height: 28px; stroke-width: 1.6; }
  .opt-label { flex: 1; line-height: 1.3; min-width: 0; overflow-wrap: break-word; }
  input[type="number"], input[type="text"], input[type="tel"] {
    width: 100%;
    padding: 15px 16px;
    font-family: var(--font);
    font-size: 17px;
    background: var(--card-2);
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-radius: 13px;
    margin-bottom: 14px;
  }
  input[type="number"].input-hero {
    font-size: 46px;
    font-weight: 600;
    text-align: center;
    padding: 16px 18px;
    letter-spacing: -0.02em;
    color: var(--primary-dark);
  }
  input[type="number"].input-hero::-webkit-inner-spin-button,
  input[type="number"].input-hero::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"].input-hero { -moz-appearance: textfield; }
  input::placeholder { color: var(--muted); }
  input:focus { outline: none; border-color: var(--primary); }
  .next-btn {
    margin-top: 4px;
    background: linear-gradient(90deg, var(--primary-2), var(--primary));
    color: #fff;
    border: none;
    border-radius: 13px;
    padding: 15px 20px;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .next-btn:hover { filter: brightness(1.08); }
  .next-btn:disabled { opacity: .4; cursor: not-allowed; }
  .result-card {
    border-radius: 24px;
    padding: 32px 28px;
    color: #fff;
  }
  .result-eligible { background: #1d9a5c; }
  .result-review { background: #d99a1f; }
  .result-no { background: #c4453d; }
  .result-tag {
    display: inline-block;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    background: rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .result-card h2 { margin: 0 0 10px; font-size: 23px; font-weight: 600; line-height: 1.25; }
  .result-card p { margin: 0 0 8px; font-size: 15px; line-height: 1.45; opacity: .95; }
  .result-value {
    background: rgba(255,255,255,0.16);
    border-radius: 12px;
    padding: 13px 16px;
    margin: 14px 0;
    font-size: 15px;
  }
  .lead-box {
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
    color: var(--ink);
  }
  .lead-box .lead-title {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 12px;
  }
  .restart-btn {
    margin-top: 14px;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.4);
    color: #fff;
    border-radius: 12px;
    padding: 12px 18px;
    font-family: var(--font);
    font-size: 15px;
    cursor: pointer;
    width: 100%;
  }
  .summary-panel {
    margin-top: 22px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .summary-panel summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    padding: 14px 16px;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-panel summary::-webkit-details-marker { display: none; }
  .summary-panel summary::before {
    content: "▸";
    color: var(--primary);
    font-size: 12px;
    transition: transform .15s;
  }
  .summary-panel[open] summary::before { transform: rotate(90deg); }
  .summary-body {
    padding: 4px 18px 18px;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
  }
  .summary-body p { margin: 0 0 8px; }
  .summary-body .summary-empty { color: var(--muted); }
  .info-box {
    background: var(--card-2);
    border-left: 3px solid var(--primary);
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 16px;
    line-height: 1.45;
    color: var(--ink);
    margin-bottom: 22px;
  }
  @media (max-width: 480px) {
    .options.options-triple { grid-template-columns: 1fr; }
    h1.question { font-size: 25px; }
    .card, .result-card { padding: 28px 22px; }
  }
  @media (max-width: 360px) {
    .options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="site-header">
  <div class="site-header-inner">
    <h2>GuiaPrev</h2>
    <span class="version">v. 2026.001</span>
  </div>
</div>
<div class="page-wrap">
  <div class="app" id="app"></div>
</div>

<script>
/* =========================================================
   PROTÓTIPO DE TESTE — Árvore de elegibilidade previdenciária
   - sessionStorage guarda histórico de respostas (some ao fechar a aba)
   - botão "voltar" navega pelo histórico real de telas visitadas
   - lógica simplificada para validar SEQUÊNCIA e PERGUNTAS, não o cálculo jurídico fino
   ========================================================= */

const STORAGE_KEY = "elegibilidade_proto_v1";

function loadState() {
  const raw = sessionStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return { history: ["start"], answers: {} };
}
function saveState(state) {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function resetState() {
  sessionStorage.removeItem(STORAGE_KEY);
  state = loadState();
  // recomeça também o histórico do navegador, para não acumular páginas antigas
  history.replaceState({ stepStack: state.history.slice() }, "");
  render();
}

let state = loadState();

// ---------- integração com o histórico do navegador ----------
// cada avanço empilha uma entrada real no browser (pushState), guardando uma
// CÓPIA COMPLETA da pilha de telas (stepStack) naquele ponto. Assim, tanto
// voltar quanto avançar pelo botão do navegador apenas restauram o snapshot
// salvo, sem precisar reconstruir nada.
if (!history.state) {
  history.replaceState({ stepStack: state.history.slice() }, "");
}

window.addEventListener("popstate", (event) => {
  const stack = event.state && event.state.stepStack ? event.state.stepStack : ["start"];
  state.history = stack.slice();
  saveState(state);
  render();
});

function currentStep() {
  return state.history[state.history.length - 1];
}
function goTo(stepId, answerKey, answerValue) {
  if (answerKey !== undefined) {
    state.answers[answerKey] = answerValue;
  }
  state.history.push(stepId);
  saveState(state);
  history.pushState({ stepStack: state.history.slice() }, "");
  render();
}
function goBack() {
  if (state.history.length > 1) {
    // aciona o histórico real do navegador; o ajuste de state.history
    // acontece no listener de popstate, mantendo as duas fontes sincronizadas
    history.back();
  }
}

// ---------- helpers de cálculo simplificado ----------
function toNum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmtMoney(v) {
  return "R$ " + v.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
const SALARIO_MIN = 1621.00;
const TETO_INSS = 8475.55;
const LIMITE_BPC_PERCAPITA = 405.25;

// ---------- definição de telas ----------
// cada step: { eyebrow, question, hint?, render(state) -> retorna node de opções }
// usamos uma função renderStep(stepId) que devolve o HTML da pergunta atual

// ---------- ícones monocromáticos (outline, herdam currentColor) ----------
const ICONS = {

  male: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="6"/><path d="M14.5 9.5L20 4"/><path d="M15 4h5v5"/></svg>`,
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  tractor: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="6.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/><path d="M9 17.5h6"/><path d="M5 11l1-6h5l1 4h4a2 2 0 0 1 2 2v3"/><path d="M11 9V5"/></svg>`,
  flask: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6l-5.5 9.5A1.5 1.5 0 0 0 5.8 21h12.4a1.5 1.5 0 0 0 1.3-2.5L14 9V3"/><path d="M8.5 14h7"/></svg>`,
  help: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.7.4-1 .9-1 1.7"/><path d="M12 17h.01"/></svg>`,
  pulse: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 7 4-14 2 7h6"/></svg>`,
  family: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M2 21v-2a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v2"/><path d="M15 14.2a4 4 0 0 1 6 3.3V19"/></svg>`,
  coins: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="9" cy="7" rx="6" ry="3.5"/><path d="M3 7v5c0 1.9 2.7 3.5 6 3.5s6-1.6 6-3.5V7"/><path d="M3 12v5c0 1.9 2.7 3.5 6 3.5 2.2 0 4.1-.6 5.2-1.6"/><path d="M15 9c2.8.3 5 1.7 5 3.5S17.8 16 15 16.2"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`,
  cross: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="16" rx="2"/><path d="M16 3v4M8 3v4M3.5 10h17"/></svg>`,
  bolt: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>`,
  heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.4-9.5-9C1 7.8 2.6 4.5 6 4c2-.3 3.7.6 6 3 2.3-2.4 4-3.3 6-3 3.4.5 5 3.8 3.5 7C19 15.6 12 20 12 20z"/></svg>`,
  briefcase: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7.5" width="18" height="12" rx="2"/><path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"/><path d="M3 12.5h18"/></svg>`,
  shieldOff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z" opacity="0.35"/><path d="M9 9l6 6M15 9l-6 6"/></svg>`,
  ban: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M6.5 6.5l11 11"/></svg>`,
  scale: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M5 7h14"/><path d="M5 7L2.5 13a2.5 2.5 0 0 0 5 0L5 7z"/><path d="M19 7l-2.5 6a2.5 2.5 0 0 0 5 0L19 7z"/></svg>`,
  baby: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="3.5"/><path d="M5.5 19c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/></svg>`,
  users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1"/><circle cx="17.5" cy="9" r="2.3"/><path d="M16 13.5c2.6.4 4.5 1.9 4.5 4v1"/></svg>`,
  alert: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l9 16H3z"/><path d="M12 10v4"/><path d="M12 17h.01"/></svg>`,
  ring: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="16" r="4.5"/><path d="M9.5 12L8 5l4-2 4 2-1.5 7"/></svg>`,
  unknown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.7.4-1 .9-1 1.7"/><path d="M12 17h.01"/></svg>`,
  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-9"/></svg>`,
  pill: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="6" rx="3" transform="rotate(-35 12 12)"/><path d="M12 12l3.5-3.5" transform="rotate(-35 12 12)"/></svg>`,
};

function optionButton(label, onClick, iconKey) {
  const btn = document.createElement("button");
  btn.className = "opt-btn";
  btn.type = "button";
  const iconHtml = iconKey && ICONS[iconKey] ? `<span class="opt-icon">${ICONS[iconKey]}</span>` : "";
  btn.innerHTML = `${iconHtml}<span class="opt-label">${label}</span>`;
  btn.onclick = onClick;
  return btn;
}

function buildOptionsScreen(container, eyebrow, question, hint, options) {
  container.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";
  // decide automaticamente o layout: opções curtas (ex: Sim/Não, Mulher/Homem)
  // cabem bem em grid quadrado; opções com frases longas ficam melhor em lista larga;
  // exatamente 3 opções curtas usam 3 colunas, para não deixar um card sozinho na 2ª linha
  const avgLen = options.reduce((sum, o) => sum + o.label.length, 0) / options.length;
  const isWide = avgLen > 22 || options.length > 4;
  const isTriple = !isWide && options.length === 3;
  const layoutClass = isWide ? " options-wide" : isTriple ? " options-triple" : "";
  card.innerHTML = `
    <div class="eyebrow">${eyebrow}</div>
    <h1 class="question">${question}</h1>
    ${hint ? `<p class="hint">${hint}</p>` : ""}
    <div class="options${layoutClass}"></div>
  `;
  const optsWrap = card.querySelector(".options");
  options.forEach(opt => {
    optsWrap.appendChild(optionButton(opt.label, opt.onClick, opt.icon));
  });
  container.appendChild(card);
}

function buildNumberScreen(container, eyebrow, question, hint, key, nextStepFn, opts = {}) {
  container.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";
  const heroClass = opts.hero ? " input-hero" : "";
  card.innerHTML = `
    <div class="eyebrow">${eyebrow}</div>
    <h1 class="question">${question}</h1>
    ${hint ? `<p class="hint">${hint}</p>` : ""}
    <input type="${opts.type || 'number'}" class="${heroClass.trim()}" id="numInput" placeholder="${opts.placeholder || ''}" value="${state.answers[key] ?? ''}">
    <button class="next-btn" id="nextBtn">Continuar</button>
  `;
  container.appendChild(card);
  const input = card.querySelector("#numInput");
  const btn = card.querySelector("#nextBtn");
  input.focus();
  function submit() {
    const val = opts.type === "text" ? input.value.trim() : toNum(input.value);
    if (opts.required !== false && (val === "" || val === 0) && opts.allowZero !== true) {
      if (opts.type === "text" && val === "") { input.focus(); return; }
      if (opts.type !== "text") { input.focus(); return; }
    }
    nextStepFn(val);
  }
  btn.onclick = submit;
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

function buildInfoScreen(container, eyebrow, title, bodyHtml, ctaLabel, onCta) {
  container.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="eyebrow">${eyebrow}</div>
    <h1 class="question">${title}</h1>
    <div class="info-box">${bodyHtml}</div>
    <button class="next-btn" id="ctaBtn">${ctaLabel}</button>
  `;
  container.appendChild(card);
  card.querySelector("#ctaBtn").onclick = onCta;
}

function buildResultScreen(container, type, title, bodyParagraphs, valueText) {
  container.innerHTML = "";
  const card = document.createElement("div");
  const cls = type === "eligible" ? "result-eligible" : type === "review" ? "result-review" : "result-no";
  const tag = type === "eligible" ? "✅ Elegível" : type === "review" ? "⚠️ Análise necessária" : "❌ Não elegível por enquanto";
  card.className = "result-card " + cls;
  card.innerHTML = `
    <div class="result-tag">${tag}</div>
    <h2>${title}</h2>
    ${bodyParagraphs.map(p => `<p>${p}</p>`).join("")}
    ${valueText ? `<div class="result-value">${valueText}</div>` : ""}
    <div class="lead-box" id="leadBox">
      <div class="lead-title">${type === "no" ? "Quer uma segunda opinião gratuita?" : "Fale com um advogado especialista"}</div>
      <input type="text" id="leadName" placeholder="Seu nome">
      <input type="tel" id="leadPhone" placeholder="WhatsApp (com DDD)">
      <button class="next-btn" id="leadSubmit">${type === "eligible" ? "Quero confirmar meu caso" : type === "review" ? "Quero a análise gratuita" : "Quero falar com um advogado"}</button>
    </div>
    <button class="restart-btn" id="restartBtn">Recomeçar simulação</button>
  `;
  container.appendChild(card);
  card.querySelector("#restartBtn").onclick = resetState;
  card.querySelector("#leadSubmit").onclick = () => {
    const name = card.querySelector("#leadName").value.trim();
    const phone = card.querySelector("#leadPhone").value.trim();
    if (!name || !phone) { alert("Preencha nome e WhatsApp para teste."); return; }
    state.answers.leadName = name;
    state.answers.leadPhone = phone;
    saveState(state);
    alert("✅ [Simulação] Lead capturado: " + name + " / " + phone);
  };
}

steps["r1a_resultado"] = (c) => {
  const idade = toNum(state.answers.r1_idade);
  const sexo = state.answers.r1_sexo; // F ou M
  const tempo = toNum(state.answers.r1_tempo_contrib);
  const antes2019 = state.answers.r1_antes_2019 !== "nao"; // "sim" ou "naosei" tratam como sim

  const idadeMinPermanente = sexo === "F" ? 62 : 65;
  const tempoMinPermanente = sexo === "F" ? 15 : 20;

  const tempoMinTransicao = sexo === "F" ? 30 : 35;
  const pontosMin2026 = sexo === "F" ? 93 : 103;
  const idadeMinProgressiva2026 = sexo === "F" ? 59.5 : 64.5;
  const idadeFixaPedagio100 = sexo === "F" ? 57 : 60;

  const pontos = idade + tempo;

  let regrasOk = [];
  // permanente
  if (idade >= idadeMinPermanente && tempo >= tempoMinPermanente) regrasOk.push("Regra permanente (idade + tempo de contribuição)");

  if (antes2019) {
    if (pontos >= pontosMin2026 && tempo >= tempoMinTransicao) regrasOk.push("Regra de transição por pontos (" + pontosMin2026 + " pontos em 2026)");
    if (idade >= idadeMinProgressiva2026 && tempo >= tempoMinTransicao) regrasOk.push("Regra de transição por idade mínima progressiva");
    if (idade >= idadeFixaPedagio100 && tempo >= tempoMinTransicao) regrasOk.push("Possível pedágio de 100% (depende do tempo que faltava em nov/2019 — confirmar com CNIS)");
  }

  if (regrasOk.length > 0) {
    buildResultScreen(c, "eligible",
      "Você provavelmente já pode se aposentar",
      [
        "Você já atende a uma regra de aposentadoria:",
        "• " + regrasOk.join("<br>• "),
        "Um advogado pode calcular qual regra te dá o melhor valor."
      ],
      "Estimativa: 60% a 100% da média salarial (piso " + fmtMoney(SALARIO_MIN) + ", teto " + fmtMoney(TETO_INSS) + ")."
    );
  } else {
    // quão perto está (heurística simples para o protótipo)
    const faltaIdadePermanente = Math.max(0, idadeMinPermanente - idade);
    const faltaTempoPermanente = Math.max(0, tempoMinPermanente - tempo);
    const faltaPontos = Math.max(0, pontosMin2026 - pontos);

    const perto = faltaIdadePermanente <= 2 || faltaTempoPermanente <= 2 || faltaPontos <= 4;

    if (perto) {
      buildResultScreen(c, "review",
        "Você está perto de se aposentar",
        [
          faltaIdadePermanente > 0 ? `Faltam cerca de ${faltaIdadePermanente} anos de idade.` : "",
          faltaTempoPermanente > 0 ? `Faltam cerca de ${faltaTempoPermanente} anos de contribuição.` : "",
        ].filter(Boolean),
        null
      );
    } else {
      buildResultScreen(c, "no",
        "Ainda não, mas vamos te avisar quando chegar a hora",
        [
          `Faltam cerca de ${faltaIdadePermanente} anos de idade e/ou ${faltaTempoPermanente} anos de contribuição.`,
          "Regras de transição podem antecipar isso."
        ],
        null
      );
    }
  }
};

    buildResultScreen(c, "review",
      "Pode ter direito — depende da perícia médica",
      ["A perícia decide se a incapacidade é definitiva. Requisitos administrativos já parecem atendidos."],
      valorTexto
    );
  } else {
    buildResultScreen(c, "eligible",
      "Você atende aos requisitos da aposentadoria por incapacidade permanente",
      ["Segurado e carência atendidos. A perícia confirma a incapacidade total e permanente."],
      valorTexto
    );
  }
};

};

steps["r4_segurado"] = (c) => {

function r4ProximoPasso() {
  const parentesco = state.answers.r4_parentesco;
  if (parentesco === "conjuge") return "r4_uniao";
  if (parentesco === "filho") return "r4_idade_filho";
  return "r4_resultado_outros";
}

    { label: "Menos de 18", icon: "calendar", onClick: () => { state.answers.r4_contribuicoes = "menos18"; goTo(r4ProximoPasso()); } },
    { label: "18 ou mais", icon: "calendar", onClick: () => { state.answers.r4_contribuicoes = "mais18"; goTo(r4ProximoPasso()); } },

};

steps["r4_uniao"] = (c) => {
  buildOptionsScreen(c, "Pensão por morte · 4/6",

  ]);

steps["r4_resultado_curta"] = (c) => {
  buildResultScreen(c, "eligible",
    "Você tem direito, mas por prazo curto",

      "Ainda assim, vale formalizar o pedido."

  );
};

steps["r4_idade_conjuge"] = (c) => {
  buildNumberScreen(c, "Pensão por morte · 6/6",

  );
};

steps["r4_resultado_conjuge"] = (c) => {
  const idade = toNum(state.answers.r4_idade_conjuge_val);
  const contribuicoes = state.answers.r4_contribuicoes;

  let duracao = "";
  if (idade < 22) duracao = "3 anos";
  else if (idade <= 27) duracao = "6 anos";
  else if (idade <= 30) duracao = "10 anos";
  else if (idade <= 41) duracao = "15 anos";
  else if (idade <= 44) duracao = "20 anos";
  else duracao = "vitalícia";

  if (contribuicoes === "naosei") {
    buildResultScreen(c, "review",
      "Pode ter direito — confirme as contribuições do falecido",
      ["Duração e valor dependem do CNIS do falecido."],
      `Duração estimada pela idade: ${duracao}.`
    );
    return;
  }

  buildResultScreen(c, "eligible",
    "Você atende aos requisitos da pensão por morte",
    [],
    `Duração estimada: ${duracao}. Valor: 50% do benefício + 10% por dependente (até 100%).`
  );
};

steps["r4_resultado_outros"] = (c) => {

steps["r5_gastos_saude"] = (c) => {

  const pessoas = Math.max(1, toNum(state.answers.r5_pessoas_val));
  const renda = toNum(state.answers.r5_renda_val);
  const percapita = renda / pessoas;

  state.answers.r5_percapita = percapita;
  saveState(state);

  if (percapita <= LIMITE_BPC_PERCAPITA) {
    buildResultScreen(c, "eligible",
      "Você atende ao critério de renda do BPC",
      [
        `Renda per capita estimada: ${fmtMoney(percapita)} (limite: ${fmtMoney(LIMITE_BPC_PERCAPITA)}).`,
        "Se for por deficiência, ainda passa por avaliação biopsicossocial (perícia médica + avaliação social) — nunca é automático."

    );
  } else {
    goTo("r5_gastos_saude");
  }
};

steps["r5_resultado_final"] = (c) => {
  const percapita = state.answers.r5_percapita || 0;
  const gastos = state.answers.r5_gastos_saude === "sim";

  if (gastos) {
    buildResultScreen(c, "review",
      "Pode ter direito mesmo com renda acima do limite",
      [
        `Sua renda per capita (${fmtMoney(percapita)}) está acima do limite de ${fmtMoney(LIMITE_BPC_PERCAPITA)}, mas a jurisprudência (STJ, Temas 185 e 1.038) permite considerar vulnerabilidade social mesmo assim, especialmente com gastos altos de saúde.`,
      ],
      null
    );
  } else {
    buildResultScreen(c, "no",
      "Renda acima do limite, sem outros indicativos de vulnerabilidade",
      [
        `Sua renda per capita (${fmtMoney(percapita)}) está acima do limite de ${fmtMoney(LIMITE_BPC_PERCAPITA)}.`,
        "Ainda assim, pode valer a pena uma consulta caso existam outras despesas ou situações de vulnerabilidade não mencionadas aqui."
      ],
      null
    );
  }
};

// ============================================================
// RESUMO TÉCNICO PARA ADVOGADO — traduz as respostas em linguagem natural
// ============================================================

function yesNo(v, simTxt = "Sim", naoTxt = "Não", naoseiTxt = "Não soube informar") {
  if (v === "sim") return simTxt;
  if (v === "nao") return naoTxt;
  if (v === "naosei") return naoseiTxt;
  return null;
}

function buildLawyerSummaryText() {
  const a = state.answers;
  const lines = [];

  // ---- identificação do ramo ----
  const ramoLabels = {
    aposentadoria: "Aposentadoria",
    incapacidade: "Incapacidade (auxílio-doença ou aposentadoria por invalidez)",
    pensao: "Pensão por morte",
    bpc: "BPC/LOAS",
  };
  if (a.situacao) lines.push(`Solicitação relacionada a: ${ramoLabels[a.situacao] || a.situacao}.`);

  // ---- RAMO 1: aposentadoria ----
  if (a.situacao === "aposentadoria") {
    const tipoLabels = { urbana: "trabalho urbano com contribuição ao INSS", rural: "trabalho rural", especial: "atividade especial (insalubre/perigosa)", naosei: "tempo de contribuição incerto, tratado como urbano" };
    if (a.r1_tipo) lines.push(`Perfil informado: ${tipoLabels[a.r1_tipo] || a.r1_tipo}.`);

    if (a.r1_idade !== undefined) lines.push(`Idade atual: ${a.r1_idade} anos.`);
    if (a.r1_sexo) lines.push(`Sexo: ${a.r1_sexo === "F" ? "feminino" : "masculino"}.`);
    if (a.r1_tempo_contrib !== undefined) lines.push(`Tempo de contribuição ao INSS informado: ${a.r1_tempo_contrib} anos.`);
    if (a.r1_antes_2019) lines.push(`Começou a contribuir antes de 13/11/2019: ${yesNo(a.r1_antes_2019)}.`);

    if (a.r1b_tempo_ok) lines.push(`Comprova 15+ anos de atividade rural: ${yesNo(a.r1b_tempo_ok)}.`);
    if (a.r1b_idade_val !== undefined) lines.push(`Idade informada (rural): ${a.r1b_idade_val} anos.`);
    if (a.r1b_sexo) lines.push(`Sexo: ${a.r1b_sexo === "F" ? "feminino" : "masculino"}.`);

    const riscoLabels = { "15": "alto risco (15 anos exigidos)", "20": "risco médio (20 anos exigidos)", "25": "risco mais brando/periculosidade (25 anos exigidos)", naosei: "risco não classificado pelo cliente (referência conservadora de 25 anos)" };
    if (a.r1c_risco_tipo) lines.push(`Categoria de risco da atividade especial: ${riscoLabels[a.r1c_risco_tipo] || a.r1c_risco_tipo}.`);
    if (a.r1c_tempo_val !== undefined) lines.push(`Tempo de exposição informado: ${a.r1c_tempo_val} anos.`);
    if (a.r1c_antes_2019) lines.push(`Começou a trabalhar nessa condição antes de 13/11/2019: ${yesNo(a.r1c_antes_2019)}.`);
  }

  // ---- RAMOS 2/3: incapacidade ----
  if (a.situacao === "incapacidade") {
    const duracaoLabels = { menos15: "menos de 15 dias", media: "entre 15 dias e alguns meses", permanente: "longa duração, possivelmente permanente" };
    if (a.r23_duracao) lines.push(`Tempo de afastamento do trabalho: ${duracaoLabels[a.r23_duracao] || a.r23_duracao}.`);

    const vinculoLabels = { ativo: "estava contribuindo ao INSS no início da incapacidade", parado: "havia parado de contribuir há mais de 1 ano", nunca: "nunca contribuiu ao INSS" };
    if (a.r23_vinculo) lines.push(`Vínculo com o INSS: ${vinculoLabels[a.r23_vinculo] || a.r23_vinculo}.`);
    if (a.r23_periodo_graca_estendido) lines.push(`Situação que estende o período de graça (desemprego com 10+ anos de contribuição, filho pequeno ou prisão): ${yesNo(a.r23_periodo_graca_estendido)}.`);

    const tempoContribLabels = { menos12: "menos de 12 meses", mais12: "12 meses ou mais", naosei: "não soube informar" };
    if (a.r23_tempo_contrib) lines.push(`Tempo de contribuição ao INSS: ${tempoContribLabels[a.r23_tempo_contrib] || a.r23_tempo_contrib}.`);

    const causaLabels = { acidente: "acidente (de qualquer natureza)", grave: "doença grave da lista do INSS", ocupacional: "doença profissional/ocupacional", comum: "doença comum, sem dispensa de carência" };
    if (a.r23_causa) lines.push(`Causa do afastamento: ${causaLabels[a.r23_causa] || a.r23_causa}.`);

    const permanenteLabels = { sim: "incapacidade permanente, já atestada por médico", incerto: "ainda em tratamento, sem definição médica de permanência", nao: "incapacidade temporária" };
    if (a.r23_permanente) lines.push(`Natureza da incapacidade: ${permanenteLabels[a.r23_permanente] || a.r23_permanente}.`);

    if (a.r23_relacao_trabalho) lines.push(`Relação com acidente de trabalho ou doença ocupacional: ${yesNo(a.r23_relacao_trabalho)}.`);
    if (a.r23_ajuda_terceiros) lines.push(`Necessita de ajuda de terceiros para atividades básicas (possível adicional de 25%): ${yesNo(a.r23_ajuda_terceiros)}.`);
  }

  // ---- RAMO 4: pensão por morte ----
  if (a.situacao === "pensao") {
    const parentescoLabels = { conjuge: "cônjuge ou companheiro(a)", filho: "filho(a) ou enteado(a)", pais: "pai ou mãe (dependência econômica)", irmao: "irmão ou irmã (dependência econômica)" };
    if (a.r4_parentesco) lines.push(`Parentesco do requerente com o falecido: ${parentescoLabels[a.r4_parentesco] || a.r4_parentesco}.`);

    const seguradoLabels = { ativo: "era segurado ativo ou aposentado no momento do óbito", graca: "havia parado de contribuir há pouco tempo (possível período de graça)", nunca: "não contribuía há muito tempo ou nunca contribuiu" };
    if (a.r4_segurado) lines.push(`Qualidade de segurado do falecido: ${seguradoLabels[a.r4_segurado] || a.r4_segurado}.`);

    const contribLabels = { menos18: "menos de 18 contribuições mensais", mais18: "18 contribuições mensais ou mais", naosei: "número de contribuições não informado" };
    if (a.r4_contribuicoes) lines.push(`Contribuições do falecido ao INSS: ${contribLabels[a.r4_contribuicoes] || a.r4_contribuicoes}.`);

    if (a.r4_uniao) lines.push(`Duração da união/casamento até o óbito: ${a.r4_uniao === "menos2" ? "menos de 2 anos" : "2 anos ou mais"}.`);
    if (a.r4_acidente) lines.push(`Falecimento decorrente de acidente: ${yesNo(a.r4_acidente)}.`);
    if (a.r4_idade_conjuge_val !== undefined) lines.push(`Idade do dependente (cônjuge) na data do óbito: ${a.r4_idade_conjuge_val} anos.`);

    const filhoLabels = { menor21: "menor de 21 anos, não emancipado", maior_invalido: "21 anos ou mais, com deficiência ou invalidez", maior_sem: "21 anos ou mais, sem deficiência ou invalidez" };
    if (a.r4_filho_idade) lines.push(`Situação do dependente (filho/enteado): ${filhoLabels[a.r4_filho_idade] || a.r4_filho_idade}.`);
  }

  // ---- RAMO 5: BPC/LOAS ----
  if (a.situacao === "bpc") {
    const situacaoLabels = { idoso: "idoso, 65 anos ou mais", deficiencia: "pessoa com deficiência de longo prazo", responsavel: "responsável legal por criança/adolescente com deficiência" };
    if (a.r5_situacao) lines.push(`Situação do requerente: ${situacaoLabels[a.r5_situacao] || a.r5_situacao}.`);
    if (a.r5_pessoas_val !== undefined) lines.push(`Número de pessoas no grupo familiar: ${a.r5_pessoas_val}.`);
    if (a.r5_renda_val !== undefined) lines.push(`Renda total mensal da família informada: ${fmtMoney(toNum(a.r5_renda_val))}.`);
    if (a.r5_percapita !== undefined) lines.push(`Renda per capita calculada: ${fmtMoney(a.r5_percapita)} (limite legal: ${fmtMoney(LIMITE_BPC_PERCAPITA)}).`);
    if (a.r5_cadunico) lines.push(`Cadastro no CadÚnico: ${yesNo(a.r5_cadunico, "Sim, já cadastrado", "Ainda não cadastrado", "Não soube informar")}.`);
    if (a.r5_gastos_saude) lines.push(`Gastos elevados com saúde na família (remédios, fraldas, tratamentos): ${yesNo(a.r5_gastos_saude)}.`);
  }

  // ---- contato (se já capturado) ----
  if (a.leadName) lines.push(`Contato informado: ${a.leadName}${a.leadPhone ? " — " + a.leadPhone : ""}.`);

  return lines;
}

// ============================================================
// RENDER PRINCIPAL
// ============================================================

function render() {
  const app = document.getElementById("app");
  let stepId = currentStep();

  app.innerHTML = "";

  const topbar = document.createElement("div");
  topbar.className = "topbar";
  const backBtn = document.createElement("button");
  backBtn.className = "back-btn";
  backBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>`;
  backBtn.disabled = state.history.length <= 1;
  backBtn.onclick = goBack;
  const track = document.createElement("div");
  track.className = "progress-track";
  const fill = document.createElement("div");
  fill.className = "progress-fill";
  const pct = Math.min(95, state.history.length * 8);
  fill.style.width = pct + "%";
  track.appendChild(fill);
  const label = document.createElement("div");
  label.className = "step-label";
  label.textContent = "Tela " + state.history.length;
  topbar.appendChild(backBtn);
  topbar.appendChild(track);
  topbar.appendChild(label);
  app.appendChild(topbar);

  const container = document.createElement("div");
  app.appendChild(container);

  const stepFn = steps[stepId];
  if (stepFn) {
    stepFn(container);
  } else {
    container.innerHTML = `<div class="card"><p>Tela não encontrada: ${stepId}</p></div>`;
  }

  // resumo técnico para advogado — traduz as respostas em linguagem natural
  const summaryLines = buildLawyerSummaryText();
  const summary = document.createElement("details");
  summary.className = "summary-panel";
  const bodyHtml = summaryLines.length
    ? summaryLines.map(l => `<p>${l}</p>`).join("")
    : `<p class="summary-empty">Nenhuma informação registrada ainda.</p>`;
  summary.innerHTML = `<summary>Resumo técnico para advogado</summary><div class="summary-body">${bodyHtml}</div>`;
  app.appendChild(summary);
}

render();
</script>
