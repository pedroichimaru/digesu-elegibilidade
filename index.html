<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Elegibilidade Previdenciária — Protótipo</title>
<style>
  :root {
    --bg: #f6f5f2;
    --card: #ffffff;
    --ink: #1f2a24;
    --muted: #6b7570;
    --primary: #2f6f4f;
    --primary-dark: #234f38;
    --warn: #b5841f;
    --bad: #a13c3c;
    --border: #e2e0d8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 560px;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink);
    flex-shrink: 0;
  }
  .back-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width .25s ease;
    border-radius: 999px;
  }
  .step-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--primary);
    margin-bottom: 8px;
  }
  h1.question {
    font-size: 22px;
    line-height: 1.35;
    margin: 0 0 6px;
  }
  .hint {
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 20px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .opt-btn {
    text-align: left;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opt-btn:hover {
    border-color: var(--primary);
    background: #f3f8f5;
  }
  .opt-btn.selected {
    border-color: var(--primary);
    background: #eaf4ee;
    font-weight: 600;
  }
  input[type="number"], input[type="text"], input[type="tel"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
  }
  input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
  .next-btn {
    margin-top: 6px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .next-btn:hover { background: var(--primary-dark); }
  .next-btn:disabled { opacity: .4; cursor: not-allowed; }
  .result-card {
    border-radius: 16px;
    padding: 28px 24px;
    color: #fff;
  }
  .result-eligible { background: linear-gradient(135deg, #2f6f4f, #234f38); }
  .result-review { background: linear-gradient(135deg, #b5841f, #8a611a); }
  .result-no { background: linear-gradient(135deg, #6b7570, #4f5650); }
  .result-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    background: rgba(255,255,255,0.18);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .result-card h2 { margin: 0 0 10px; font-size: 22px; }
  .result-card p { margin: 0 0 8px; font-size: 15px; line-height: 1.5; opacity: .95; }
  .result-value {
    background: rgba(255,255,255,0.14);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 14px 0;
    font-size: 15px;
  }
  .lead-box {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    margin-top: 16px;
    color: var(--ink);
  }
  .lead-box .lead-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 10px;
  }
  .restart-btn {
    margin-top: 14px;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.5);
    color: #fff;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
  }
  .debug-panel {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
    background: #fbfbf9;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    max-height: 160px;
    overflow-y: auto;
  }
  .debug-panel summary { cursor: pointer; font-weight: 600; color: var(--ink); }
  .debug-panel pre { white-space: pre-wrap; margin: 8px 0 0; }
  .pill-group { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .pill {
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
    background: #fff;
  }
  .pill.selected { border-color: var(--primary); background: #eaf4ee; font-weight: 600; }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .checkbox-row input { width: 18px; height: 18px; }
  .info-box {
    background: #f3f8f5;
    border-left: 3px solid var(--primary);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* =========================================================
   PROTÓTIPO DE TESTE — Árvore de elegibilidade previdenciária
   - sessionStorage guarda histórico de respostas (some ao fechar a aba)
   - botão "voltar" navega pelo histórico real de telas visitadas
   - lógica simplificada para validar SEQUÊNCIA e PERGUNTAS, não o cálculo jurídico fino
   ========================================================= */

const STORAGE_KEY = "elegibilidade_proto_v1";

function loadState() {
  const raw = sessionStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return { history: ["start"], answers: {} };
}
function saveState(state) {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function resetState() {
  sessionStorage.removeItem(STORAGE_KEY);
  state = loadState();
  render();
}

let state = loadState();

function currentStep() {
  return state.history[state.history.length - 1];
}
function goTo(stepId, answerKey, answerValue) {
  if (answerKey !== undefined) {
    state.answers[answerKey] = answerValue;
  }
  state.history.push(stepId);
  saveState(state);
  render();
}
function goBack() {
  if (state.history.length > 1) {
    state.history.pop();
    saveState(state);
    render();
  }
}

// ---------- helpers de cálculo simplificado ----------
function toNum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmtMoney(v) {
  return "R$ " + v.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
const SALARIO_MIN = 1621.00;
const TETO_INSS = 8475.55;
const LIMITE_BPC_PERCAPITA = 405.25;

// ---------- definição de telas ----------
// cada step: { eyebrow, question, hint?, render(state) -> retorna node de opções }
// usamos uma função renderStep(stepId) que devolve o HTML da pergunta atual

function optionButton(label, onClick) {
  const btn = document.createElement("button");
  btn.className = "opt-btn";
  btn.textContent = label;
  btn.onclick = onClick;
  return btn;
}

function buildOptionsScreen(container, eyebrow, question, hint, options) {
  container.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="eyebrow">${eyebrow}</div>
    <h1 class="question">${question}</h1>
    ${hint ? `<p class="hint">${hint}</p>` : ""}
    <div class="options"></div>
  `;
  const optsWrap = card.querySelector(".options");
  options.forEach(opt => {
    optsWrap.appendChild(optionButton(opt.label, opt.onClick));
  });
  container.appendChild(card);
}

function buildNumberScreen(container, eyebrow, question, hint, key, nextStepFn, opts = {}) {
  container.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="eyebrow">${eyebrow}</div>
    <h1 class="question">${question}</h1>
    ${hint ? `<p class="hint">${hint}</p>` : ""}
    <input type="${opts.type || 'number'}" id="numInput" placeholder="${opts.placeholder || ''}" value="${state.answers[key] ?? ''}">
    <button class="next-btn" id="nextBtn">Continuar</button>
  `;
  container.appendChild(card);
  const input = card.querySelector("#numInput");
  const btn = card.querySelector("#nextBtn");
  input.focus();
  function submit() {
    const val = opts.type === "text" ? input.value.trim() : toNum(input.value);
    if (opts.required !== false && (val === "" || val === 0) && opts.allowZero !== true) {
      if (opts.type === "text" && val === "") { input.focus(); return; }
      if (opts.type !== "text") { input.focus(); return; }
    }
    nextStepFn(val);
  }
  btn.onclick = submit;
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

function buildInfoScreen(container, eyebrow, title, bodyHtml, ctaLabel, onCta) {
  container.innerHTML = "";
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="eyebrow">${eyebrow}</div>
    <h1 class="question">${title}</h1>
    <div class="info-box">${bodyHtml}</div>
    <button class="next-btn" id="ctaBtn">${ctaLabel}</button>
  `;
  container.appendChild(card);
  card.querySelector("#ctaBtn").onclick = onCta;
}

function buildResultScreen(container, type, title, bodyParagraphs, valueText) {
  container.innerHTML = "";
  const card = document.createElement("div");
  const cls = type === "eligible" ? "result-eligible" : type === "review" ? "result-review" : "result-no";
  const tag = type === "eligible" ? "✅ Elegível" : type === "review" ? "⚠️ Análise necessária" : "❌ Não elegível por enquanto";
  card.className = "result-card " + cls;
  card.innerHTML = `
    <div class="result-tag">${tag}</div>
    <h2>${title}</h2>
    ${bodyParagraphs.map(p => `<p>${p}</p>`).join("")}
    ${valueText ? `<div class="result-value">${valueText}</div>` : ""}
    <div class="lead-box" id="leadBox">
      <div class="lead-title">${type === "no" ? "Quer uma segunda opinião gratuita?" : "Fale com um advogado especialista"}</div>
      <input type="text" id="leadName" placeholder="Seu nome">
      <input type="tel" id="leadPhone" placeholder="WhatsApp (com DDD)">
      <button class="next-btn" id="leadSubmit">${type === "eligible" ? "Quero confirmar meu caso" : type === "review" ? "Quero a análise gratuita" : "Quero falar com um advogado"}</button>
    </div>
    <button class="restart-btn" id="restartBtn">Recomeçar simulação</button>
  `;
  container.appendChild(card);
  card.querySelector("#restartBtn").onclick = resetState;
  card.querySelector("#leadSubmit").onclick = () => {
    const name = card.querySelector("#leadName").value.trim();
    const phone = card.querySelector("#leadPhone").value.trim();
    if (!name || !phone) { alert("Preencha nome e WhatsApp para teste."); return; }
    state.answers.leadName = name;
    state.answers.leadPhone = phone;
    saveState(state);
    alert("✅ [Simulação] Lead capturado: " + name + " / " + phone);
  };
}

// ============================================================
// DEFINIÇÃO DOS STEPS — cada função recebe o container e desenha a tela
// ============================================================

const steps = {};

// ---- TELA 1: entrada geral ----
steps["start"] = (c) => {
  buildOptionsScreen(c, "Passo 1 de N", "Qual situação melhor descreve o que você está buscando?", null, [
    { label: "Quero me aposentar", onClick: () => goTo("r1_p1", "situacao", "aposentadoria") },
    { label: "Estou doente/me machuquei e não consigo trabalhar", onClick: () => goTo("r23_p1", "situacao", "incapacidade") },
    { label: "Um familiar faleceu e preciso saber se tenho direito a pensão", onClick: () => goTo("r4_p1", "situacao", "pensao") },
    { label: "Sou idoso ou tenho deficiência e tenho pouca renda", onClick: () => goTo("r5_p1", "situacao", "bpc") },
  ]);
};

// =========================================
// RAMO 1 — APOSENTADORIA
// =========================================

steps["r1_p1"] = (c) => {
  buildOptionsScreen(c, "Aposentadoria · 1/6", "Qual é a sua situação em relação ao trabalho?", null, [
    { label: "Já contribuí (ou meu empregador contribuiu) para o INSS por muitos anos", onClick: () => goTo("r1a_idade", "r1_tipo", "urbana") },
    { label: "Trabalhei a vida toda na roça/lavoura (rural), com pouca ou nenhuma contribuição formal", onClick: () => goTo("r1b_rural_tempo", "r1_tipo", "rural") },
    { label: "Trabalhei exposto a algo que prejudica a saúde (poeira, químicos, ruído, eletricidade, etc.)", onClick: () => goTo("r1c_risco", "r1_tipo", "especial") },
    { label: "Não tenho certeza de quanto tempo contribuí", onClick: () => goTo("r1_naosei_info", "r1_tipo", "naosei") },
  ]);
};

steps["r1_naosei_info"] = (c) => {
  buildInfoScreen(c, "Aposentadoria",
    "Sem problemas, vamos estimar",
    "Vamos calcular com base na sua idade e situação. Depois, um advogado confirma os dados exatos consultando seu CNIS (extrato do INSS).",
    "Continuar",
    () => goTo("r1a_idade", "r1_tipo_efetivo", "urbana")
  );
};

steps["r1a_idade"] = (c) => {
  buildNumberScreen(c, "Aposentadoria · 2/6", "Qual sua idade hoje?", null, "r1_idade",
    (val) => goTo("r1a_sexo", "r1_idade", val)
  );
};

steps["r1a_sexo"] = (c) => {
  buildOptionsScreen(c, "Aposentadoria · 3/6", "Você é homem ou mulher?",
    "Perguntamos porque a lei prevê idades e tempos mínimos diferentes por sexo.", [
    { label: "Mulher", onClick: () => goTo("r1a_tempo_contrib", "r1_sexo", "F") },
    { label: "Homem", onClick: () => goTo("r1a_tempo_contrib", "r1_sexo", "M") },
  ]);
};

steps["r1a_tempo_contrib"] = (c) => {
  buildNumberScreen(c, "Aposentadoria · 4/6",
    "Há quantos anos, aproximadamente, você contribui ou contribuiu para o INSS?",
    "Some todos os empregos e períodos, mesmo que não tenham sido contínuos.",
    "r1_tempo_contrib",
    (val) => goTo("r1a_antes_2019", "r1_tempo_contrib", val)
  );
};

steps["r1a_antes_2019"] = (c) => {
  buildOptionsScreen(c, "Aposentadoria · 5/6", "Você começou a contribuir para o INSS antes de 13/11/2019?",
    "Essa é a data da Reforma da Previdência — ela define quais regras você pode usar.", [
    { label: "Sim", onClick: () => goTo("r1a_resultado", "r1_antes_2019", "sim") },
    { label: "Não", onClick: () => goTo("r1a_resultado", "r1_antes_2019", "nao") },
    { label: "Não sei", onClick: () => goTo("r1a_resultado", "r1_antes_2019", "naosei") },
  ]);
};

steps["r1a_resultado"] = (c) => {
  const idade = toNum(state.answers.r1_idade);
  const sexo = state.answers.r1_sexo; // F ou M
  const tempo = toNum(state.answers.r1_tempo_contrib);
  const antes2019 = state.answers.r1_antes_2019 !== "nao"; // "sim" ou "naosei" tratam como sim

  const idadeMinPermanente = sexo === "F" ? 62 : 65;
  const tempoMinPermanente = sexo === "F" ? 15 : 20;

  const tempoMinTransicao = sexo === "F" ? 30 : 35;
  const pontosMin2026 = sexo === "F" ? 93 : 103;
  const idadeMinProgressiva2026 = sexo === "F" ? 59.5 : 64.5;
  const idadeFixaPedagio100 = sexo === "F" ? 57 : 60;

  const pontos = idade + tempo;

  let regrasOk = [];
  // permanente
  if (idade >= idadeMinPermanente && tempo >= tempoMinPermanente) regrasOk.push("Regra permanente (idade + tempo de contribuição)");

  if (antes2019) {
    if (pontos >= pontosMin2026 && tempo >= tempoMinTransicao) regrasOk.push("Regra de transição por pontos (" + pontosMin2026 + " pontos em 2026)");
    if (idade >= idadeMinProgressiva2026 && tempo >= tempoMinTransicao) regrasOk.push("Regra de transição por idade mínima progressiva");
    if (idade >= idadeFixaPedagio100 && tempo >= tempoMinTransicao) regrasOk.push("Possível pedágio de 100% (depende do tempo que faltava em nov/2019 — confirmar com CNIS)");
  }

  if (regrasOk.length > 0) {
    buildResultScreen(c, "eligible",
      "Você provavelmente já pode se aposentar",
      [
        "Com base nas respostas, você atende a pelo menos uma regra de aposentadoria:",
        "• " + regrasOk.join("<br>• "),
        "A regra mais vantajosa em valor (não só em data) depende de um cálculo comparativo, que um advogado pode fazer com seu CNIS."
      ],
      "Estimativa: entre 60% e 100% da média salarial, respeitando piso de " + fmtMoney(SALARIO_MIN) + " e teto de " + fmtMoney(TETO_INSS) + "."
    );
  } else {
    // quão perto está (heurística simples para o protótipo)
    const faltaIdadePermanente = Math.max(0, idadeMinPermanente - idade);
    const faltaTempoPermanente = Math.max(0, tempoMinPermanente - tempo);
    const faltaPontos = Math.max(0, pontosMin2026 - pontos);

    const perto = faltaIdadePermanente <= 2 || faltaTempoPermanente <= 2 || faltaPontos <= 4;

    if (perto) {
      buildResultScreen(c, "review",
        "Você está perto de se aposentar",
        [
          "Ainda não atende a nenhuma regra hoje, mas está próximo.",
          faltaIdadePermanente > 0 ? `Faltam aproximadamente ${faltaIdadePermanente} anos para a idade mínima da regra permanente.` : "",
          faltaTempoPermanente > 0 ? `Faltam aproximadamente ${faltaTempoPermanente} anos de contribuição para a regra permanente.` : "",
        ].filter(Boolean),
        null
      );
    } else {
      buildResultScreen(c, "no",
        "Ainda não, mas vamos te avisar quando chegar a hora",
        [
          `Pela regra permanente, faltam aproximadamente ${faltaIdadePermanente} anos de idade e/ou ${faltaTempoPermanente} anos de contribuição.`,
          "As regras de transição podem antecipar isso — vale confirmar com um especialista."
        ],
        null
      );
    }
  }
};

// ---- 1B RURAL ----
steps["r1b_rural_tempo"] = (c) => {
  buildOptionsScreen(c, "Aposentadoria rural · 2/4",
    "Você trabalhou em atividade rural (lavoura, pecuária, pesca artesanal) por pelo menos 15 anos, mesmo sem carteira assinada?", null, [
    { label: "Sim", onClick: () => goTo("r1b_idade", "r1b_tempo_ok", "sim") },
    { label: "Não", onClick: () => goTo("r1b_idade", "r1b_tempo_ok", "nao") },
  ]);
};

steps["r1b_idade"] = (c) => {
  buildNumberScreen(c, "Aposentadoria rural · 3/4", "Qual sua idade?", null, "r1b_idade_val",
    (val) => goTo("r1b_sexo", "r1b_idade_val", val)
  );
};

steps["r1b_sexo"] = (c) => {
  buildOptionsScreen(c, "Aposentadoria rural · 4/4", "Você é homem ou mulher?", null, [
    { label: "Mulher", onClick: () => goTo("r1b_resultado", "r1b_sexo", "F") },
    { label: "Homem", onClick: () => goTo("r1b_resultado", "r1b_sexo", "M") },
  ]);
};

steps["r1b_resultado"] = (c) => {
  const tempoOk = state.answers.r1b_tempo_ok === "sim";
  const idade = toNum(state.answers.r1b_idade_val);
  const sexo = state.answers.r1b_sexo;
  const idadeMin = sexo === "F" ? 55 : 60;

  if (tempoOk && idade >= idadeMin) {
    buildResultScreen(c, "eligible",
      "Você atende aos requisitos da aposentadoria rural",
      [
        "Você cumpre idade mínima e tempo de atividade rural exigidos.",
        "A comprovação do tempo rural (testemunhas, notas de produtor, sindicato rural etc.) será avaliada por um advogado para reunir as provas necessárias."
      ],
      "Estimativa: 1 salário-mínimo (" + fmtMoney(SALARIO_MIN) + "), salvo contribuições adicionais."
    );
  } else {
    const faltaIdade = Math.max(0, idadeMin - idade);
    buildResultScreen(c, "no",
      "Ainda não atende aos requisitos rurais",
      [
        !tempoOk ? "É necessário comprovar pelo menos 15 anos de atividade rural." : "",
        faltaIdade > 0 ? `Faltam aproximadamente ${faltaIdade} anos para a idade mínima (${idadeMin} anos).` : ""
      ].filter(Boolean),
      null
    );
  }
};

// ---- 1C ESPECIAL ----
steps["r1c_risco"] = (c) => {
  buildOptionsScreen(c, "Aposentadoria especial · 2/5",
    "Qual desses riscos mais se aproxima do que você enfrentava no trabalho?", null, [
    { label: "Agentes químicos perigosos, radiação ionizante, ou trabalho em minas", onClick: () => goTo("r1c_tempo", "r1c_risco_tipo", "15") },
    { label: "Ruído acima do limite legal, calor excessivo, vibração, ou agentes biológicos (hospitais/laboratórios)", onClick: () => goTo("r1c_tempo", "r1c_risco_tipo", "20") },

      "Você atende ao critério de renda do BPC",
      [
        `Renda per capita estimada: ${fmtMoney(percapita)} (limite: ${fmtMoney(LIMITE_BPC_PERCAPITA)}).`,
        "Se for por deficiência, ainda passa por avaliação biopsicossocial (perícia médica + avaliação social) — nunca é automático."
      ],
      "Valor do BPC: 1 salário-mínimo (" + fmtMoney(SALARIO_MIN) + "), fixo."
    );
  } else {
    goTo("r5_gastos_saude");
  }
};

steps["r5_resultado_final"] = (c) => {
  const percapita = state.answers.r5_percapita || 0;
  const gastos = state.answers.r5_gastos_saude === "sim";

  if (gastos) {
    buildResultScreen(c, "review",
      "Pode ter direito mesmo com renda acima do limite",
      [
        `Sua renda per capita (${fmtMoney(percapita)}) está acima do limite de ${fmtMoney(LIMITE_BPC_PERCAPITA)}, mas a jurisprudência (STJ, Temas 185 e 1.038) permite considerar vulnerabilidade social mesmo assim, especialmente com gastos altos de saúde.`,
      ],
      null
    );
  } else {
    buildResultScreen(c, "no",
      "Renda acima do limite, sem outros indicativos de vulnerabilidade",
      [
        `Sua renda per capita (${fmtMoney(percapita)}) está acima do limite de ${fmtMoney(LIMITE_BPC_PERCAPITA)}.`,
        "Ainda assim, pode valer a pena uma consulta caso existam outras despesas ou situações de vulnerabilidade não mencionadas aqui."
      ],
      null
    );
  }
};

// ============================================================
// RENDER PRINCIPAL
// ============================================================

function render() {
  const app = document.getElementById("app");
  let stepId = currentStep();

  app.innerHTML = "";

  const topbar = document.createElement("div");
  topbar.className = "topbar";
  const backBtn = document.createElement("button");
  backBtn.className = "back-btn";
  backBtn.innerHTML = "&#8592;";
  backBtn.disabled = state.history.length <= 1;
  backBtn.onclick = goBack;
  const track = document.createElement("div");
  track.className = "progress-track";
  const fill = document.createElement("div");
  fill.className = "progress-fill";
  const pct = Math.min(95, state.history.length * 8);
  fill.style.width = pct + "%";
  track.appendChild(fill);
  const label = document.createElement("div");
  label.className = "step-label";
  label.textContent = "Tela " + state.history.length;
  topbar.appendChild(backBtn);
  topbar.appendChild(track);
  topbar.appendChild(label);
  app.appendChild(topbar);

  const container = document.createElement("div");
  app.appendChild(container);

  const stepFn = steps[stepId];
  if (stepFn) {
    stepFn(container);
  } else {
    container.innerHTML = `<div class="card"><p>Tela não encontrada: ${stepId}</p></div>`;
  }

  // painel de debug — mostra respostas acumuladas na sessão
  const debug = document.createElement("details");
  debug.className = "debug-panel";
  debug.innerHTML = `<summary>Ver respostas armazenadas na sessão (debug)</summary><pre>${JSON.stringify(state.answers, null, 2)}\n\nHistórico de telas:\n${state.history.join(" → ")}</pre>`;
  app.appendChild(debug);
}

render();
</script>
</body>
</html>
